name: Verify

on:
  push:
  pull_request:

jobs:
  tests:
    name: Unity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          unityVersion: 6000.3.16f1
          testMode: all
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results

  windows-build:
    name: Shipping Windows build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          unityVersion: 6000.3.16f1
          targetPlatform: StandaloneWindows64
          buildMethod: MvpBuilder.BuildWindows
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Builds/Windows

  standalone-smoke:
    name: Shipping standalone smoke
    runs-on: windows-latest
    needs: windows-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: Builds/Windows
      - name: Run victory and 6v6 natural smokes
        shell: powershell
        run: .\Tools\RunStandaloneSmokes.ps1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: standalone-smoke-logs
          path: Logs
